# docker-compose.yml — AgentGuard local development stack.
#
# Postgres serves both the Phase 2 cost ledger and Phase 3 LangGraph
# checkpointing (AsyncPostgresSaver creates its own tables on startup).
# Usage: docker-compose up postgres

services:
  # ---------------------------------------------------------------------------
  # Postgres — cost ledger + future checkpointing
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-agentguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agentguard}
      POSTGRES_DB: ${POSTGRES_DB:-agentguard}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agentguard} -d ${POSTGRES_DB:-agentguard}"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # App
  # ---------------------------------------------------------------------------
  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    ports:
      - "8000:8000"

volumes:
  pgdata:
    name: agentguard_pgdata
